<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FreeHands · Local duck test</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body class="duck-body">
  <header class="nav glass duck-nav">
    <div class="brand">
      <span class="brand-dot"></span>
      <span class="brand-name">FreeHands</span>
      <span class="brand-by">duck test</span>
    </div>
  </header>

  <main id="duck-game" class="duck-game">
    <div class="duck-retro-bg" aria-hidden="true">
      <div class="duck-sky"></div>
      <div class="duck-tree"><span></span><span></span><span></span></div>
      <div class="duck-bush bush-a"></div>
      <div class="duck-bush bush-b"></div>
      <div class="duck-grass"></div>
    </div>
    <canvas id="duck-canvas"></canvas>
    <div id="duck-shot-layer" class="duck-shot-layer"></div>
    <div id="duck-gesture" class="duck-gesture glass">Local app: ready</div>
    <section class="duck-help glass">
      <strong id="duck-user">FreeHands</strong>
      <span>Start FreeHands Desktop, activate it, look at a duck, then use your index-click gesture.</span>
      <span>This page does not use browser gaze or browser gestures; it only listens for normal pointer movement and clicks.</span>
    </section>
    <div class="duck-hud glass">
      <strong id="duck-score">0 / 30</strong>
      <span id="duck-status">Ready</span>
      <button id="duck-start" class="btn btn-primary">Start</button>
    </div>
    <div id="duck-crosshair" class="duck-crosshair"></div>
    <section id="duck-result" class="glass card duck-result hidden">
      <h1 id="duck-title">Result</h1>
      <p id="duck-copy" class="lead"></p>
      <button id="duck-again" class="btn btn-accent">Repeat</button>
    </section>
  </main>

  <script type="module" src="assets/duck-hunt.js"></script>
</body>
</html>
