<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FreeHands · Local duck test</title>
  <meta name="description" content="FreeHands GitHub Pages opens the local desktop Duck test only." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/style.css" />
  <script>
    const params = new URLSearchParams(window.location.search);
    const user = params.get('user') || window.localStorage.getItem('freehands:user') || 'Ntizar';
    window.localStorage.setItem('freehands:user', user);
    window.location.replace(`duck-hunt.html?user=${encodeURIComponent(user)}`);
  </script>
</head>
<body class="duck-body">
  <main class="duck-game">
    <div class="duck-retro-bg" aria-hidden="true">
      <div class="duck-sky"></div>
      <div class="duck-tree"><span></span><span></span><span></span></div>
      <div class="duck-bush bush-a"></div>
      <div class="duck-bush bush-b"></div>
      <div class="duck-grass"></div>
    </div>
    <section class="duck-help glass">
      <strong>FreeHands local duck test</strong>
      <span>GitHub Pages opens only the Duck test. Start FreeHands Desktop locally, then continue here.</span>
      <a class="btn btn-primary" href="duck-hunt.html?user=Ntizar">Open Duck test</a>
    </section>
  </main>
</body>
</html>
